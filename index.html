<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Snapshot Attendance Tracker login page" />
    <title>Snapshot Attendance Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth-page">
    <div class="page-shell">
      <div class="login-card" aria-labelledby="login-title">
        <div class="brand" role="banner">
          <img src="images/logo.svg" alt="Snapshot Attendance Tracker logo" class="brand-logo" />
          <div>
            <h1 id="login-title">Snapshot Attendance Tracker</h1>
            <p>Modern attendance monitoring for schools and colleges.</p>
          </div>
        </div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>

          <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role" required>
              <option value="">Select a role</option>
              <option value="admin">Admin</option>
              <option value="teacher">Teacher</option>
              <option value="student">Student</option>
            </select>
          </div>

          <div class="form-meta">
            <label class="checkbox-field">
              <input id="rememberMe" name="rememberMe" type="checkbox" />
              <span>Remember me</span>
            </label>
            <a href="#" class="link-text">Forgot password?</a>
          </div>

          <button type="submit" class="primary-btn" id="loginButton">
            <span class="button-label">Log In</span>
            <span class="spinner" hidden></span>
          </button>

          <p id="formMessage" class="form-message" role="status" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
